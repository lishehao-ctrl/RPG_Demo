server {
    listen 80;
    server_name rpg.shehao.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rpg.shehao.app;

    ssl_certificate /etc/ssl/certs/rpg-shehao-app.crt;
    ssl_certificate_key /etc/ssl/private/rpg-shehao-app.key;

    root /srv/rpg-demo/app/frontend/dist;
    index index.html;

    location = /favicon.ico {
        try_files $uri =204;
        access_log off;
        log_not_found off;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8010/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(auth|author|stories|play|me)(/|$) {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
