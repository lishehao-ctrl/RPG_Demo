name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: backend (pytest + import smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend
        run: pip install -e ".[dev]"

      - name: Import smoke
        # If contracts / engine / repo / service / main fail to import,
        # fail fast before pytest even runs.
        run: |
          python -c "from rpg_backend.main import app; print('ok')"
          python -c "from rpg_backend.narrative import engine, contracts, repository, service; print('ok')"

      - name: Pytest
        run: pytest -q

  frontend2:
    name: frontend2 (tsc + vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend2
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend2/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build
